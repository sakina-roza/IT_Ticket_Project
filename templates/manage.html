<!DOCTYPE html>
<html>
<head><script src="https://cdn.tailwindcss.com"></script></head>
<body class="bg-black text-white p-10">
    <div class="max-w-2xl mx-auto">
        <a href="/dashboard" class="text-zinc-500 hover:text-red-500 text-sm">← Back to Dashboard</a>
        <div class="bg-zinc-900 p-8 rounded-3xl border border-red-600/30 mt-6">
            <h1 class="text-2xl font-bold mb-6">UPDATE <span class="text-red-600">EXCEL DATA</span></h1>
            <p class="text-xs text-zinc-500 mb-8">Enter the Ticket ID to modify the row in the Excel sheet.</p>
            
            <form id="updateForm" class="space-y-4">
                <input type="text" id="tid" placeholder="Ticket ID (e.g. TKT001)" class="w-full bg-black border border-zinc-800 p-3 rounded-xl outline-none focus:border-red-600">
                <select id="status" class="w-full bg-black border border-zinc-800 p-3 rounded-xl outline-none">
                    <option value="Open">Set Status: Open</option>
                    <option value="Resolved">Set Status: Resolved</option>
                    <option value="Closed">Set Status: Closed</option>
                </select>
                <input type="text" id="agent" placeholder="Assign to Agent" class="w-full bg-black border border-zinc-800 p-3 rounded-xl outline-none focus:border-red-600">
                <button type="button" onclick="submitUpdate()" class="w-full bg-red-600 py-4 rounded-xl font-bold hover:bg-red-700 transition-all">OVERWRITE EXCEL ROW</button>
            </form>
        </div>
    </div>
    <script>
        async function submitUpdate() {
            const res = await fetch('/api/update_ticket', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    Ticket_ID: document.getElementById('tid').value,
                    Status: document.getElementById('status').value,
                    Assigned_To: document.getElementById('agent').value
                })
            });
            const data = await res.json();
            if(data.success) alert("Excel Sheet Updated!");
            else alert("Error: Ticket ID not found.");
        }
    </script>
</body>
</html>
