<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <style> body { background: #050505; } input { color: white; } </style>
</head>
<body class="bg-black flex items-center justify-center min-h-screen p-4">
    <div class="bg-zinc-900 p-10 rounded-3xl border border-red-600/20 w-full max-w-sm">
        <a href="/login" class="text-[10px] text-zinc-600 hover:text-red-500 uppercase tracking-widest transition-colors block mb-6">← Back to Login</a>
        <h1 class="text-2xl font-black text-red-600 mb-1 italic">FORGOT <span class="text-white">PASSWORD</span></h1>
        <p class="text-xs text-zinc-600 mb-6">Enter your email to receive a password reset link.</p>

        {% if message %}
        <div class="text-green-400 text-xs mb-4 bg-green-500/10 border border-green-500/20 p-3 rounded-xl">
            {{ message }}
        </div>
        {% endif %}

        {% if not message %}
        <form method="POST" class="space-y-4">
            <div>
                <label class="text-[10px] text-zinc-500 uppercase tracking-widest block mb-1">Email Address</label>
                <input type="email" name="email" placeholder="you@company.com" required
                    class="w-full bg-black border border-zinc-800 p-3 rounded-xl outline-none focus:border-red-600 transition-colors">
            </div>
            <button type="submit"
                class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 rounded-xl transition-all active:scale-95">
                SEND RESET LINK
            </button>
        </form>
        {% endif %}

        <div class="mt-6 text-center">
            <p class="text-xs text-zinc-600">
                Remember your password?
                <a href="/login" class="text-red-500 hover:text-red-400 font-bold">Sign In</a>
            </p>
        </div>
    </div>
</body>
</html>
