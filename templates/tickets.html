<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: white; font-family: sans-serif; }
        .glass { background: rgba(255,255,255,0.03); border: 1px solid rgba(220,38,38,0.2); }
        select option { background: #111; }
    </style>
</head>
<body class="p-6">
<div class="max-w-7xl mx-auto">

    {% set active = 'tickets' %}
    {% include 'nav.html' %}

    <!-- HEADER -->
    <div class="flex justify-between items-center mb-5">
        <h1 class="text-2xl font-black">TICKET <span class="text-red-600">DATABASE</span></h1>
        <button onclick="exportCSV()" class="bg-zinc-800 hover:bg-zinc-700 px-4 py-2 rounded-xl text-xs font-bold uppercase transition-all">⬇ Export CSV</button>
    </div>

    <!-- FILTERS -->
    <div class="glass p-4 rounded-2xl mb-4 grid grid-cols-2 md:grid-cols-6 gap-3">
        <input type="text" id="f-search" placeholder="Search ID / Category..." oninput="loadTable()"
            class="col-span-2 bg-black border border-zinc-800 p-2 rounded-xl text-sm outline-none focus:border-red-600 transition-colors">
        <select id="f-status" onchange="loadTable()" class="bg-black border border-zinc-800 p-2 rounded-xl text-sm outline-none focus:border-red-600 text-zinc-300">
            <option value="All">All Status</option>
            <option value="Open">Open</option>
            <option value="In Progress">In Progress</option>
            <option value="Resolved">Resolved</option>
            <option value="Closed">Closed</option>
        </select>
        <select id="f-priority" onchange="loadTable()" class="bg-black border border-zinc-800 p-2 rounded-xl text-sm outline-none focus:border-red-600 text-zinc-300">
            <option value="All">All Priority</option>
            <option value="Critical">Critical</option>
            <option value="High">High</option>
            <option value="Medium">Medium</option>
            <option value="Low">Low</option>
        </select>
        <input type="date" id="f-date-from" onchange="loadTable()" title="From date"
            class="bg-black border border-zinc-800 p-2 rounded-xl text-sm outline-none focus:border-red-600 text-zinc-400">
        <input type="date" id="f-date-to" onchange="loadTable()" title="To date"
            class="bg-black border border-zinc-800 p-2 rounded-xl text-sm outline-none focus:border-red-600 text-zinc-400">
    </div>

    <!-- BULK ACTION BAR -->
    <div id="bulk-bar" style="display:none" class="bg-zinc-900 border border-red-600/30 p-3 rounded-2xl mb-4 flex flex-wrap items-center gap-3">
        <span id="bulk-count" class="text-xs text-zinc-400 font-mono">0 selected</span>
        <select id="bulk-status" class="bg-black border border-zinc-700 p-2 rounded-xl text-xs outline-none text-zinc-300">
            <option value="">Change Status...</option>
            <option value="Open">Open</option>
            <option value="In Progress">In Progress</option>
            <option value="Resolved">Resolved</option>
            <option value="Closed">Closed</option>
        </select>
        <select id="bulk-priority" class="bg-black border border-zinc-700 p-2 rounded-xl text-xs outline-none text-zinc-300">
            <option value="">Change Priority...</option>
            <option value="Critical">Critical</option>
            <option value="High">High</option>
            <option value="Medium">Medium</option>
            <option value="Low">Low</option>
        </select>
        <button onclick="applyBulk()" class="bg-red-600 hover:bg-red-700 px-4 py-2 rounded-xl text-xs font-bold uppercase transition-all">Apply</button>
        <button onclick="clearSelection()" class="text-zinc-500 hover:text-white text-xs transition-colors">✕ Clear</button>
    </div>

    <!-- TABLE -->
    <div class="glass rounded-2xl overflow-x-auto">
        <table class="w-full text-left text-sm min-w-[700px]">
            <thead class="bg-zinc-900 text-zinc-400 text-xs uppercase tracking-widest">
                <tr>
                    <th class="p-4 w-10"><input type="checkbox" id="select-all" onchange="toggleAll(this)" class="accent-red-600"></th>
                    <th class="p-4">ID</th>
                    <th class="p-4">Category</th>
                    <th class="p-4">Priority</th>
                    <th class="p-4">Status</th>
                    <th class="p-4">Agent</th>
                    <th class="p-4">SLA</th>
                    <th class="p-4">Res. (h)</th>
                    <th class="p-4 text-right">Actions</th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
        <div id="table-empty" class="hidden p-10 text-center text-zinc-600 text-sm">No tickets match the current filters.</div>
    </div>
    
    <!-- PAGINATION -->
    <div class="flex justify-between items-center mt-6">
        <div id="table-count" class="text-xs text-zinc-600 font-mono italic"></div>
        <div id="pagination" class="flex gap-2"></div>
    </div>

</div>

<script>
    let allData = [];
    let selectedIds  = new Set();
    let currentPage  = 1;
    let totalPages   = 1;
    let totalRecords = 0;
    const pageSize   = 10;

    const SLA_COLOR = { on_track: 'text-green-400', near_breach: 'text-yellow-400', breached: 'text-red-400', unknown: 'text-zinc-600' };
    const SLA_LABEL = { on_track: '🟢 OK', near_breach: '🟡 Near', breached: '🔴 Breach', unknown: '⚪ N/A' };
    const PRI_COLOR = { Critical: 'text-red-400', High: 'text-orange-400', Medium: 'text-yellow-400', Low: 'text-zinc-400' };

    // Apply URL params (drill-down from dashboard charts)
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('priority'))  document.getElementById('f-priority').value  = urlParams.get('priority');
    if (urlParams.get('status'))    document.getElementById('f-status').value    = urlParams.get('status');
    if (urlParams.get('date_from')) document.getElementById('f-date-from').value = urlParams.get('date_from');
    if (urlParams.get('date_to'))   document.getElementById('f-date-to').value   = urlParams.get('date_to');

    async function loadTable(page) {
        if (page !== undefined) currentPage = page;
        const params   = new URLSearchParams();
        const search   = document.getElementById('f-search').value.trim();
        const status   = document.getElementById('f-status').value;
        const priority = document.getElementById('f-priority').value;
        const dateFrom = document.getElementById('f-date-from').value;
        const dateTo   = document.getElementById('f-date-to').value;

        if (search)             params.set('search',    search);
        if (status   !== 'All') params.set('status',    status);
        if (priority !== 'All') params.set('priority',  priority);
        if (dateFrom)           params.set('date_from', dateFrom);
        if (dateTo)             params.set('date_to',   dateTo);
        params.set('page',      currentPage);
        params.set('page_size', pageSize);

        try {
            const res    = await fetch('/api/all_tickets?' + params.toString());
            const result = await res.json();
            // Support both paginated (object) and legacy (array) responses
            if (Array.isArray(result)) {
                allData      = result;
                totalRecords = result.length;
                totalPages   = Math.ceil(totalRecords / pageSize);
            } else {
                allData      = result.data || [];
                totalRecords = result.total || 0;
                totalPages   = result.total_pages || 1;
                currentPage  = result.page || 1;
            }
        } catch(e) {
            allData = [];
        }

        selectedIds.clear();
        renderTable();
        updateBulkBar();
    }

    function renderTable() {
        const tbody = document.getElementById('table-body');
        const empty = document.getElementById('table-empty');
        const count = document.getElementById('table-count');
        const pagin = document.getElementById('pagination');
        document.getElementById('select-all').checked = false;

        if (!allData || allData.length === 0) {
            tbody.innerHTML = '';
            empty.classList.remove('hidden');
            count.textContent = '';
            pagin.innerHTML = '';
            return;
        }
        empty.classList.add('hidden');

        const start = (currentPage - 1) * pageSize + 1;
        const end   = start + allData.length - 1;
        count.textContent = `Showing ${start}-${end} of ${totalRecords} records`;

        tbody.innerHTML = allData.map(t => {
            const slaClass = SLA_COLOR[t.SLA_Status] || 'text-zinc-600';
            const slaLabel = SLA_LABEL[t.SLA_Status] || '⚪ N/A';
            const priClass = PRI_COLOR[t.Priority]   || 'text-white';
            const chk      = selectedIds.has(String(t.Ticket_ID)) ? 'checked' : '';
            return `
                <tr class="border-b border-white/5 hover:bg-white/5 transition group">
                    <td class="p-4"><input type="checkbox" value="${t.Ticket_ID}" ${chk} onchange="toggleRow(this)" class="accent-red-600"></td>
                    <td class="p-4 font-mono font-bold text-xs"><a href="/tickets/${t.Ticket_ID}" class="hover:text-red-500 transition-colors">${t.Ticket_ID || '--'}</a></td>
                    <td class="p-4 text-zinc-400 text-xs">${t.Category || '--'}</td>
                    <td class="p-4 text-xs font-bold ${priClass}">${t.Priority || '--'}</td>
                    <td class="p-4 text-xs">${t.Status || '--'}</td>
                    <td class="p-4 text-zinc-400 text-xs">${t.Assigned_To || '--'}</td>
                    <td class="p-4 text-xs font-bold ${slaClass}">${slaLabel}</td>
                    <td class="p-4 text-xs text-zinc-400">${t.Resolution_Time_Hours !== '' ? t.Resolution_Time_Hours : '--'}</td>
                    <td class="p-4 text-right">
                        <a href="/tickets/${t.Ticket_ID}" class="text-[9px] font-black uppercase text-zinc-600 hover:text-red-500 transition-all opacity-0 group-hover:opacity-100 p-2">Details →</a>
                    </td>
                </tr>
            `;
        }).join('');

        // Render server-side pagination buttons
        pagin.innerHTML = '';
        if (totalPages > 1) {
            if (currentPage > 1) {
                const prev = document.createElement('button');
                prev.innerText = '←';
                prev.className = 'w-8 h-8 rounded-lg text-[10px] font-black transition-all bg-zinc-900 text-zinc-500 hover:bg-zinc-800';
                prev.onclick   = () => loadTable(currentPage - 1);
                pagin.appendChild(prev);
            }
            const maxBtns = 7;
            let startP = Math.max(1, currentPage - 3);
            let endP   = Math.min(totalPages, startP + maxBtns - 1);
            if (endP - startP < maxBtns - 1) startP = Math.max(1, endP - maxBtns + 1);
            for (let i = startP; i <= endP; i++) {
                const btn = document.createElement('button');
                btn.innerText = i;
                btn.className = `w-8 h-8 rounded-lg text-[10px] font-black transition-all ${i === currentPage ? 'bg-red-600 text-white' : 'bg-zinc-900 text-zinc-500 hover:bg-zinc-800'}`;
                btn.onclick   = () => loadTable(i);
                pagin.appendChild(btn);
            }
            if (currentPage < totalPages) {
                const next = document.createElement('button');
                next.innerText = '→';
                next.className = 'w-8 h-8 rounded-lg text-[10px] font-black transition-all bg-zinc-900 text-zinc-500 hover:bg-zinc-800';
                next.onclick   = () => loadTable(currentPage + 1);
                pagin.appendChild(next);
            }
        }
    }

    function toggleRow(cb) {
        if (cb.checked) selectedIds.add(String(cb.value));
        else selectedIds.delete(String(cb.value));
        updateBulkBar();
    }

    function toggleAll(master) {
        document.querySelectorAll('#table-body input[type=checkbox]').forEach(cb => {
            cb.checked = master.checked;
            if (master.checked) selectedIds.add(String(cb.value));
            else selectedIds.delete(String(cb.value));
        });
        updateBulkBar();
    }

    function updateBulkBar() {
        const bar = document.getElementById('bulk-bar');
        document.getElementById('bulk-count').textContent = `${selectedIds.size} selected`;
        if (selectedIds.size > 0) bar.style.display = 'flex';
        else bar.style.display = 'none';
    }

    function clearSelection() {
        selectedIds.clear();
        document.querySelectorAll('#table-body input[type=checkbox]').forEach(cb => cb.checked = false);
        document.getElementById('select-all').checked = false;
        updateBulkBar();
    }

    async function applyBulk() {
        const status   = document.getElementById('bulk-status').value;
        const priority = document.getElementById('bulk-priority').value;
        const updates  = {};
        if (status)   updates.Status   = status;
        if (priority) updates.Priority = priority;
        if (!Object.keys(updates).length) return alert('Select a status or priority to apply.');

        const res = await fetch('/api/bulk_update', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ ticket_ids: [...selectedIds], updates })
        });
        const data = await res.json();
        if (data.success) {
            alert(`✅ Updated ${data.updated} ticket(s).`);
            clearSelection();
            loadTable(1);
        } else {
            alert('Error: ' + (data.error || 'Unknown error'));
        }
    }

    function exportCSV() {
        const params = new URLSearchParams();
        const search   = document.getElementById('f-search').value.trim();
        const status   = document.getElementById('f-status').value;
        const priority = document.getElementById('f-priority').value;
        if (search)              params.set('search',   search);
        if (status   !== 'All') params.set('status',   status);
        if (priority !== 'All') params.set('priority', priority);
        window.location.href = '/api/export?' + params.toString();
    }

    loadTable();

</script>
</body>
</html>
