<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000000; }
        input { color: white; }
    </style>
</head>
<body class="bg-black flex items-center justify-center min-h-screen p-4">
    <div class="bg-zinc-900 p-10 rounded-3xl border border-red-600/20 w-full max-w-md">
        <h1 class="text-2xl font-black text-red-600 mb-1 italic">CREATE <span class="text-white">ACCOUNT</span></h1>
        <p class="text-xs text-zinc-600 mb-6">Join the IT Command Center</p>

        {% if error %}
        <p class="text-red-500 text-xs mb-4 bg-red-500/10 border border-red-500/20 p-3 rounded-xl">{{ error }}</p>
        {% endif %}

        <form method="POST" class="space-y-4">
            <div>
                <label class="text-[10px] text-zinc-500 uppercase tracking-widest block mb-1">Full Name</label>
                <input type="text" name="name" placeholder="Your name" required
                    class="w-full bg-black border border-zinc-800 p-3 rounded-xl text-white outline-none focus:border-red-600 transition-colors">
            </div>
            <div>
                <label class="text-[10px] text-zinc-500 uppercase tracking-widest block mb-1">Email</label>
                <input type="email" name="email" placeholder="you@company.com" required
                    class="w-full bg-black border border-zinc-800 p-3 rounded-xl text-white outline-none focus:border-red-600 transition-colors">
            </div>
            <div>
                <label class="text-[10px] text-zinc-500 uppercase tracking-widest block mb-1">Password</label>
                <input type="password" name="password" placeholder="Min. 6 characters" required minlength="6"
                    class="w-full bg-black border border-zinc-800 p-3 rounded-xl text-white outline-none focus:border-red-600 transition-colors">
            </div>
            <div>
                <label class="text-[10px] text-zinc-500 uppercase tracking-widest block mb-1">Confirm Password</label>
                <input type="password" name="confirm_password" placeholder="Repeat password" required
                    class="w-full bg-black border border-zinc-800 p-3 rounded-xl text-white outline-none focus:border-red-600 transition-colors">
            </div>
            <button type="submit"
                class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 rounded-xl transition-all active:scale-95 mt-2">
                CREATE ACCOUNT
            </button>
        </form>

        <p class="text-center text-xs text-zinc-600 mt-6">
            Already have an account?
            <a href="/login" class="text-red-500 hover:text-red-500 font-bold">Sign In</a>
        </p>
    </div>
</body>
</html>
