<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <style> body { background: #000000; } input { color: white; } </style>
</head>
<body class="bg-black flex items-center justify-center min-h-screen p-4">
    <div class="bg-zinc-900 p-10 rounded-3xl border border-red-600/20 w-full max-w-sm">
        <h1 class="text-2xl font-black text-red-600 mb-1 italic">RESET <span class="text-white">PASSWORD</span></h1>
        <p class="text-xs text-zinc-600 mb-6">Enter your new password below.</p>

        {% if error %}
        <div class="text-red-400 text-xs mb-4 bg-red-500/10 border border-red-500/20 p-3 rounded-xl">
            {{ error }}
        </div>
        {% endif %}

        {% if token and not error %}
        <form method="POST" class="space-y-4">
            <div>
                <label class="text-[10px] text-zinc-500 uppercase tracking-widest block mb-1">New Password</label>
                <input type="password" name="password" placeholder="Min 6 characters" required minlength="6"
                    class="w-full bg-black border border-zinc-800 p-3 rounded-xl outline-none focus:border-red-600 transition-colors">
            </div>
            <div>
                <label class="text-[10px] text-zinc-500 uppercase tracking-widest block mb-1">Confirm Password</label>
                <input type="password" id="confirm-pw" placeholder="Confirm password" required
                    class="w-full bg-black border border-zinc-800 p-3 rounded-xl outline-none focus:border-red-600 transition-colors">
            </div>
            <button type="submit" onclick="return validatePw()"
                class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 rounded-xl transition-all active:scale-95">
                RESET PASSWORD
            </button>
        </form>
        {% endif %}

        <div class="mt-6 text-center">
            <a href="/login" class="text-xs text-zinc-600 hover:text-red-500 transition-colors">← Back to Login</a>
        </div>
    </div>
<script>
    function validatePw() {
        const pw1 = document.querySelector('input[name="password"]').value;
        const pw2 = document.getElementById('confirm-pw').value;
        if (pw1 !== pw2) { alert('Passwords do not match.'); return false; }
        return true;
    }
</script>
</body>
</html>
