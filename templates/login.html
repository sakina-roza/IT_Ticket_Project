<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black flex items-center justify-center h-screen">
    <div class="bg-zinc-900 p-10 rounded-3xl border border-red-600/20 w-96">
        <h1 class="text-2xl font-black text-red-600 mb-6 italic">IT COMMAND <span class="text-white">LOGIN</span></h1>
        {% if error %}<p class="text-red-500 text-xs mb-4">{{ error }}</p>{% endif %}
        <form method="POST">
            <input type="email" name="email" placeholder="Email ID" class="w-full bg-black border border-zinc-800 p-3 rounded-xl mb-4 text-white outline-none focus:border-red-600">
            <input type="password" name="password" placeholder="Password" class="w-full bg-black border border-zinc-800 p-3 rounded-xl mb-6 text-white outline-none focus:border-red-600">
            <button class="w-full bg-red-600 text-white font-bold py-3 rounded-xl hover:bg-red-700 transition-all">SIGN IN</button>
        </form>
        <a href="/forgot-password" class="block mt-6 text-center text-xs text-zinc-500 hover:text-white">Forgot Password?</a>
    </div>
</body>
</html>
