<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000000; }

        /* Input text always white & visible */
        input[type="email"],
        input[type="password"],
        input[type="text"] {
            color: #ffffff !important;
            caret-color: #dc2626;
        }

        /* Placeholder dimmer so typed text stands out */
        input::placeholder { color: #52525b; }

        /* Hover glow on inputs */
        .input-field {
            background: #0a0a0a;
            border: 1.5px solid #27272a;
            border-radius: 0.75rem;
            padding: 0.75rem 1rem;
            width: 100%;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
            font-size: 0.875rem;
        }
        .input-field:hover {
            border-color: #52525b;
            background: #111111;
        }
        .input-field:focus {
            border-color: #dc2626;
            box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.12);
            background: #0f0f0f;
        }

        /* Card hover lift */
        .login-card {
            transition: box-shadow 0.3s;
        }
        .login-card:hover {
            box-shadow: 0 0 40px rgba(220, 38, 38, 0.08);
        }

        /* Submit button */
        .btn-submit {
            background: #dc2626;
            color: white;
            font-weight: 700;
            padding: 0.8rem;
            border-radius: 0.75rem;
            width: 100%;
            border: none;
            cursor: pointer;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            font-size: 0.8rem;
            transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
        }
        .btn-submit:hover {
            background: #b91c1c;
            box-shadow: 0 4px 20px rgba(220, 38, 38, 0.35);
        }
        .btn-submit:active { transform: scale(0.97); }

        /* Label */
        .field-label {
            display: block;
            font-size: 0.6rem;
            color: #71717a;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            font-weight: 700;
            margin-bottom: 0.35rem;
        }

        /* Eye toggle button */
        .eye-btn {
            position: absolute; right: 0.75rem; top: 50%; transform: translateY(-50%);
            background: none; border: none; cursor: pointer; color: #52525b;
            transition: color 0.2s; padding: 2px;
        }
        .eye-btn:hover { color: #dc2626; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="login-card bg-zinc-900 p-10 rounded-3xl border border-red-600/20 w-full max-w-sm">

        <!-- Header -->
        <div class="mb-8">
            <h1 class="text-2xl font-black italic">
                <span class="text-red-600">IT COMMAND</span>
                <span class="text-white"> LOGIN</span>
            </h1>
            <p class="text-xs text-zinc-500 mt-1">Sign in to access your dashboard</p>
        </div>

        <!-- Error message -->
        {% if error %}
        <div class="mb-5 flex items-center gap-2 bg-red-500/10 border border-red-500/30 p-3 rounded-xl">
            <span class="text-red-400 text-sm">⚠</span>
            <p class="text-red-400 text-xs font-medium">{{ error }}</p>
        </div>
        {% endif %}

        <!-- Form -->
        <form method="POST" class="space-y-5">

            <!-- Email -->
            <div>
                <label class="field-label">Email Address</label>
                <input type="email" name="email" class="input-field"
                       placeholder="you@company.com" required
                       autocomplete="email">
            </div>

            <!-- Password -->
            <div>
                <label class="field-label">Password</label>
                <div class="relative">
                    <input type="password" name="password" id="password"
                           class="input-field" style="padding-right: 2.75rem;"
                           placeholder="Enter your password" required
                           autocomplete="current-password">
                    <button type="button" class="eye-btn" onclick="togglePassword()" tabindex="-1">
                        <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                        </svg>
                        <svg id="eye-off-icon" xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.477 0-8.268-2.943-9.542-7a9.97 9.97 0 012.162-3.591M6.47 6.47A9.97 9.97 0 0112 5c4.477 0 8.268 2.943 9.542 7a9.97 9.97 0 01-1.357 2.56M3 3l18 18"/>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Forgot password link -->
            <div class="text-right -mt-2">
                <a href="/forgot_password" class="text-[10px] text-zinc-600 hover:text-red-500 transition-colors font-medium">
                    Forgot password?
                </a>
            </div>

            <!-- Submit -->
            <button type="submit" class="btn-submit">Sign In</button>
        </form>

        <!-- Sign up link -->
        <div class="mt-6 text-center border-t border-white/5 pt-5">
            <p class="text-xs text-zinc-600">
                Don't have an account?
                <a href="/signup" class="text-red-500 hover:text-red-500 font-bold transition-colors ml-1">Create Account</a>
            </p>
        </div>
    </div>

    <script>
        function togglePassword() {
            const input      = document.getElementById('password');
            const eyeIcon    = document.getElementById('eye-icon');
            const eyeOffIcon = document.getElementById('eye-off-icon');
            if (input.type === 'password') {
                input.type = 'text';
                eyeIcon.classList.add('hidden');
                eyeOffIcon.classList.remove('hidden');
            } else {
                input.type = 'password';
                eyeIcon.classList.remove('hidden');
                eyeOffIcon.classList.add('hidden');
            }
        }
    </script>

</body>
</html>
