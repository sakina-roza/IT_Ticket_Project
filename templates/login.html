<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <style> body { background: #050505; } input { color: white; } </style>
</head>
<body class="bg-black flex items-center justify-center min-h-screen p-4">
    <div class="bg-zinc-900 p-10 rounded-3xl border border-red-600/20 w-full max-w-sm">
        <h1 class="text-2xl font-black text-red-600 mb-1 italic">IT COMMAND <span class="text-white">LOGIN</span></h1>
        <p class="text-xs text-zinc-600 mb-6">Sign in to access your dashboard</p>

        {% if error %}
        <p class="text-red-500 text-xs mb-4 bg-red-500/10 border border-red-500/20 p-3 rounded-xl">{{ error }}</p>
        {% endif %}

        <form method="POST" class="space-y-4">
            <div>
                <label class="text-[10px] text-zinc-500 uppercase tracking-widest block mb-1">Email</label>
                <input type="email" name="email" placeholder="you@company.com" required
                    class="w-full bg-black border border-zinc-800 p-3 rounded-xl outline-none focus:border-red-600 transition-colors">
            </div>
            <div>
                <label class="text-[10px] text-zinc-500 uppercase tracking-widest block mb-1">Password</label>
                <div class="relative">
                    <input type="password" name="password" id="password" placeholder="Password" required
                        class="w-full bg-black border border-zinc-800 p-3 rounded-xl outline-none focus:border-red-600 transition-colors pr-10">
                    <button type="button" onclick="togglePassword()"
                        class="absolute right-3 top-1/2 -translate-y-1/2 text-zinc-500 hover:text-white transition-colors">
                        <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                        </svg>
                        <svg id="eye-off-icon" xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M13.875 18.825A10.05 10.05 0 0112 19c-4.477 0-8.268-2.943-9.542-7a9.97 9.97 0 012.162-3.591M6.47 6.47A9.97 9.97 0 0112 5c4.477 0 8.268 2.943 9.542 7a9.97 9.97 0 01-1.357 2.56M3 3l18 18" />
                        </svg>
                    </button>
                </div>
            </div>
            <button type="submit"
                class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 rounded-xl transition-all active:scale-95">
                SIGN IN
            </button>
        </form>

        <script>
            function togglePassword() {
                const input = document.getElementById('password');
                const eyeIcon = document.getElementById('eye-icon');
                const eyeOffIcon = document.getElementById('eye-off-icon');
                if (input.type === 'password') {
                    input.type = 'text';
                    eyeIcon.classList.add('hidden');
                    eyeOffIcon.classList.remove('hidden');
                } else {
                    input.type = 'password';
                    eyeIcon.classList.remove('hidden');
                    eyeOffIcon.classList.add('hidden');
                }
            }
        </script>

        <div class="mt-6 text-center">
            <p class="text-xs text-zinc-600">
                Don't have an account?
                <a href="/signup" class="text-red-500 hover:text-red-400 font-bold">Sign Up</a>
            </p>
            <p class="text-[10px] text-zinc-700 mt-3">Contact your admin to reset your password.</p>
        </div>
    </div>
</body>
</html>
