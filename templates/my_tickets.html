<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: white; font-family: sans-serif; }
        .glass { background: rgba(255,255,255,0.03); border: 1px solid rgba(220,38,38,0.2); }
        .progress-bar { height: 4px; background: #18181b; border-radius: 9999px; overflow: hidden; }
        .progress-fill { height: 100%; border-radius: 9999px; transition: width 1s ease; }
    </style>
</head>
<body class="p-6">
<div class="max-w-4xl mx-auto">

    {% set active = 'my_tickets' %}
    {% include 'nav.html' %}

    <div class="flex justify-between items-end mb-8">
        <div>
            <h1 class="text-3xl font-black italic">MY <span class="text-red-600">TICKETS</span></h1>
            <p class="text-xs text-zinc-500 mt-1">Track the progress of your submitted tickets.</p>
        </div>
        <a href="/create_ticket" class="bg-red-600 hover:bg-red-700 px-5 py-2 rounded-xl text-xs font-bold uppercase transition-all active:scale-95">+ New Ticket</a>
    </div>

    <!-- Summary Cards -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
        <div class="glass p-5 rounded-2xl text-center">
            <p class="text-[10px] text-zinc-500 uppercase tracking-widest">Total</p>
            <p id="s-total" class="text-3xl font-bold mt-1">--</p>
        </div>
        <div class="glass p-5 rounded-2xl text-center border-b-2 border-red-600">
            <p class="text-[10px] text-red-500 uppercase tracking-widest">Open</p>
            <p id="s-open" class="text-3xl font-bold mt-1">--</p>
        </div>
        <div class="glass p-5 rounded-2xl text-center border-b-2 border-yellow-600">
            <p class="text-[10px] text-yellow-500 uppercase tracking-widest">In Progress</p>
            <p id="s-inprog" class="text-3xl font-bold mt-1">--</p>
        </div>
        <div class="glass p-5 rounded-2xl text-center border-b-2 border-green-600">
            <p class="text-[10px] text-green-500 uppercase tracking-widest">Resolved</p>
            <p id="s-resolved" class="text-3xl font-bold mt-1">--</p>
        </div>
    </div>

    <!-- Ticket Cards -->
    <div id="tickets-container" class="space-y-4"></div>
    <div id="no-tickets" class="hidden glass p-12 rounded-3xl text-center">
        <p class="text-4xl mb-4">🎫</p>
        <h2 class="text-lg font-bold text-zinc-400">No tickets yet</h2>
        <p class="text-xs text-zinc-600 mt-2">Submit your first ticket and track it here.</p>
        <a href="/create_ticket" class="inline-block mt-6 bg-red-600 hover:bg-red-700 px-6 py-2 rounded-xl text-xs font-bold uppercase transition-all">Create Ticket</a>
    </div>

</div>
<script>
    const STATUS_CONFIG = {
        'Open':        { color: 'text-red-400',    bar: '#dc2626', bg: 'border-red-600/30' },
        'In Progress': { color: 'text-yellow-400', bar: '#eab308', bg: 'border-yellow-600/30' },
        'Resolved':    { color: 'text-green-400',  bar: '#22c55e', bg: 'border-green-600/30' },
        'Closed':      { color: 'text-zinc-400',   bar: '#52525b', bg: 'border-zinc-600/30' }
    };
    const PRI_COLOR = { Critical:'text-red-400', High:'text-orange-400', Medium:'text-yellow-400', Low:'text-zinc-400' };

    async function load() {
        const res  = await fetch('/api/my_tickets');
        const data = await res.json();

        const total    = data.length;
        const open     = data.filter(t => t.Status === 'Open').length;
        const inprog   = data.filter(t => t.Status === 'In Progress').length;
        const resolved = data.filter(t => ['Resolved','Closed'].includes(t.Status)).length;

        document.getElementById('s-total').textContent   = total;
        document.getElementById('s-open').textContent    = open;
        document.getElementById('s-inprog').textContent  = inprog;
        document.getElementById('s-resolved').textContent = resolved;

        const container = document.getElementById('tickets-container');
        const noTickets = document.getElementById('no-tickets');

        if (!data.length) { noTickets.classList.remove('hidden'); return; }
        noTickets.classList.add('hidden');

        const BORDER_COLOR = {
            'Open': 'rgba(220,38,38,0.3)', 'In Progress': 'rgba(234,179,8,0.3)',
            'Resolved': 'rgba(34,197,94,0.3)', 'Closed': 'rgba(82,82,91,0.3)'
        };

        container.innerHTML = data.reverse().map(t => {
            const cfg      = STATUS_CONFIG[t.Status] || STATUS_CONFIG['Open'];
            const priColor = PRI_COLOR[t.Priority]  || 'text-zinc-400';
            const progress = t.Progress || 10;
            const steps    = ['Open','In Progress','Resolved','Closed'];
            const stepIdx  = steps.indexOf(t.Status);
            const borderClr = BORDER_COLOR[t.Status] || 'rgba(220,38,38,0.2)';

            return `
            <div class="glass p-6 rounded-2xl" style="border-color:${borderClr}">
                <div class="flex justify-between items-start mb-4">
                    <div>
                        <p class="font-mono font-bold text-sm">${t.Ticket_ID}</p>
                        <p class="text-zinc-400 text-xs mt-0.5">${t.Category || 'General'}</p>
                    </div>
                    <div class="text-right">
                        <span class="text-xs font-bold ${cfg.color}">${t.Status}</span>
                        <p class="text-[10px] text-zinc-600 mt-0.5">${t.Priority || '--'} priority</p>
                    </div>
                </div>

                <!-- Progress bar -->
                <div class="progress-bar mb-2">
                    <div class="progress-fill" style="width:${progress}%; background:${cfg.bar};"></div>
                </div>

                <!-- Step indicator -->
                <div class="flex justify-between mb-4">
                    ${steps.map((s,i) => `
                        <span class="text-[9px] uppercase tracking-widest ${i <= stepIdx ? 'text-zinc-300 font-bold' : 'text-zinc-700'}">${s}</span>
                    `).join('')}
                </div>

                <div class="flex justify-between text-[10px] text-zinc-600">
                    <span>Assigned to: <span class="text-zinc-400">${t.Assigned_To || 'Unassigned'}</span></span>
                    <span>${t.Created_Date || ''}</span>
                </div>
            </div>`;
        }).join('');
    }

    load();
    setInterval(load, 20000);
</script>
</body>
</html>
